apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notafilia-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RafaFuentes4/notafilia-infra.git
    targetRevision: main
    path: infrastructure
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
