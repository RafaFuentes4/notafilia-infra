apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: notafilia-pg
  namespace: production
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: notafilia
      owner: notafilia

  storage:
    size: 20Gi
    storageClass: csi-cinder-high-speed

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  backup:
    barmanObjectStore:
      destinationPath: s3://notafilia-media/pg-backups/production
      endpointURL: https://s3.gra.io.cloud.ovh.net
      s3Credentials:
        accessKeyId:
          name: pg-backup-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-creds
          key: SECRET_ACCESS_KEY
    retentionPolicy: "2d"
