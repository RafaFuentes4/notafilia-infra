apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: notafilia-tls
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: notafilia-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - notafilia.es
    - staging.notafilia.es
