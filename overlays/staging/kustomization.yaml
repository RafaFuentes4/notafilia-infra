apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
- ../../base
  # secrets.enc.yaml is SOPS-encrypted and applied directly to the cluster.
  # Will be managed by ArgoCD once KSOPS plugin is configured.

  # Override the hostname in HTTPRoute

  # Override ALLOWED_HOSTS in ConfigMap
patches:
- patch: |-
    - op: replace
      path: /spec/hostnames/0
      value: staging.notafilia.es
  target:
    kind: HTTPRoute
    name: notafilia
- patch: |-
    - op: replace
      path: /data/ALLOWED_HOSTS
      value: "staging.notafilia.es"
  target:
    kind: ConfigMap
    name: notafilia-config

images:
- name: ghcr.io/rafafuentes4/notafilia
  newTag: 0.3.0
