apiVersion: apps/v1
kind: Deployment
metadata:
  name: notafilia-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notafilia
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notafilia
        app.kubernetes.io/component: web
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/rafafuentes4/notafilia:latest
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: notafilia-config
            - secretRef:
                name: notafilia-secrets
      containers:
        - name: web
          image: ghcr.io/rafafuentes4/notafilia:latest
          command:
            - gunicorn
            - --bind=0.0.0.0:8000
            - --workers=1
            - --threads=8
            - --timeout=0
            - notafilia.wsgi:application
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: notafilia-config
            - secretRef:
                name: notafilia-secrets
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
