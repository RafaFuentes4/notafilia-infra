apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notafilia
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "notafilia.example.com"  # Overridden by overlay
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: notafilia-web
          port: 8000
